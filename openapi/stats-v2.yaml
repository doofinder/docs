components:
  parameters:
    account_code:
      description: The account code to filter by.
      in: query
      name: account_code
      schema:
        type: string
    aggregate:
      description: Flag to indicate when to aggregate all Search Engines stats data.
      in: query
      name: aggregate
      required: false
      schema:
        default: true
        type: boolean
    device:
      description: Filter by kind of device.
      in: query
      name: device
      schema:
        enum:
        - desktop
        - mobile
        type: string
    dfid:
      description: Filter by a doofinder item id. You can get this value from the
        playground.
      in: query
      name: dfid
      schema:
        type: string
    exclude:
      description: Exclude filters
      in: query
      name: exclude
      schema:
        properties:
          total_hits:
            description: Exclude by the number of search results.
            type: integer
        type: object
    facet:
      description: Filter by a facet.
      in: query
      name: facet
      schema:
        items:
          type: string
        type: array
    format:
      description: Indicates which response format should be used
      in: query
      name: format
      schema:
        default: json
        enum:
        - json
        - csv
        type: string
    from:
      description: Start date of the period in the format of UNIX timestamp or YYYYMMDD.
      in: query
      name: from
      required: true
      schema:
        pattern: ^20\d{2}(0[1-9]|1[012])(0[1-9]|[12][0-9]|3[01])$|^\d{10}|^\d{13}$
        type: string
    hashids_required:
      description: Unique id of the search engine. It accepts an array of values.
        Arrays parameters must be in the format `param[]=value`.
      in: query
      name: hashids
      required: true
      schema:
        items:
          pattern: ^[a-f0-9]{32}$
          type: string
        type: array
    indices:
      description: "Filter by index name.\n\nParameters:\n  * name *: The name of\
        \ the index to filter\n  * hashid *: The hashid where `name` belongs\n\nFormat:\n\
        \  indices[i][name]=value&indices[i][hashid]=hashid.\n"
      example: indices[1][name]=product1&indices[1][hashid]=hashid1&indices[2][name]=product2&indices[2][hashid]=hashid2
      in: query
      name: indices
      schema:
        type: object
    metric_name:
      description: Filter by the name of sector.
      in: path
      name: name
      required: true
      schema:
        enum:
        - click_through_rate
        - clicks_per_session
        - conversion_rate
        - searches_per_session
        - used_search
        - abandonment
        type: string
    no_results:
      description: Show only searches that exclusively yielded 0 results.
      in: query
      name: no_results
      schema:
        type: boolean
    opportunities:
      description: Show only searches that exclusively had "fuzzy" or "phonetic_text"
        as query name.
      in: query
      name: opportunities
      schema:
        type: boolean
    product_type:
      description: Filter by the type of product.
      in: query
      name: product_type
      schema:
        items:
          enum:
          - search
          - banner
          - custom_result
          - recommendation
          - quizz
          - aichat
          type: string
        type: array
    query:
      description: An string used to filter stats by input query.
      in: query
      name: query
      schema:
        type: string
    query_name:
      description: Type of query to filter by. Arrays parameters must be in the format
        `param[]=value`.
      in: query
      name: query_name
      schema:
        items:
          type: string
        type: array
    sector:
      description: Sector name to compute the benchmark for (e.g. "fashion", "technology").
      in: query
      name: sector
      required: true
      schema:
        type: string
    stats_hashid:
      deprecated: true
      in: query
      name: hashid
      schema:
        items:
          pattern: ^[a-f0-9]{32}$
          type: string
        type: array
    stats_hashids:
      description: Unique id of the search engine. It accepts an array of values.
        If you want to work with all user search engines just don't send this parameter.
        Arrays parameters must be in the format `param[]=value`.
      in: query
      name: hashids
      schema:
        items:
          pattern: ^[a-f0-9]{32}$
          type: string
        type: array
    to:
      description: End date of the period in the format of UNIX timestamp or YYYYMMDD.
      in: query
      name: to
      required: true
      schema:
        pattern: ^20\d{2}(0[1-9]|1[012])(0[1-9]|[12][0-9]|3[01])$|^\d{10}$|^\d{13}
        type: string
    total_hits:
      description: Filter by the number of search results.
      in: query
      name: total_hits
      schema:
        type: integer
    tz:
      description: 'The timezone for the given dates, by default, assumes ETC/UTC.

        In naming your time zones, you must stick to those indicated in the TZ database
        name column [here](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones)

        '
      example: Europe/Madrid
      in: query
      name: tz
      schema:
        default: Etc/UTC
        type: string
    widget_ids:
      in: query
      name: widget_id
      schema:
        items:
          type: string
        type: array
  responses:
    RegisterResponse:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegisterResult'
      description: Response returned over register stat operation.
    StatsBadRequest:
      content:
        application/json:
          example:
            error:
              code: bad_params
              message: Bad parameters error
          schema:
            $ref: '#/components/schemas/StatsError'
      description: Bad Request — invalid or missing query parameters.
    StatsForbidden:
      content:
        application/json:
          example:
            error:
              code: access_denied
              message: Access denied
          schema:
            $ref: '#/components/schemas/StatsError'
      description: Forbidden — token is valid but does not have access to this search
        engine.
    StatsNotFound:
      content:
        application/json:
          example:
            error:
              code: not_found
              message: Not found
          schema:
            $ref: '#/components/schemas/StatsError'
      description: Not Found — the requested search engine or resource does not exist.
    StatsTimeResponse:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatsTimeResult'
      description: Stats retrieved.
    StatsTimeout:
      content:
        application/json:
          example:
            error:
              code: timeout
              message: Request timed out
          schema:
            $ref: '#/components/schemas/StatsError'
      description: Request Timeout — the stats backend took too long; retry after
        a short delay.
    StatsTooManyRequests:
      content:
        application/json:
          example:
            error:
              code: too_many_requests
              message: Too many requests
          schema:
            $ref: '#/components/schemas/StatsError'
      description: Too Many Requests — rate limit exceeded; back off and retry.
    StatsUnauthorized:
      content:
        application/json:
          example:
            error:
              code: not_authenticated
              message: Authentication required
          schema:
            $ref: '#/components/schemas/StatsError'
      description: Unauthorized — no valid API token provided.
  schemas:
    has_init:
      default: true
      description: Indicates if the sale was made after using a doofinder product
        or not
      type: boolean
    StatsResultSerchesResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Stats searches from results.
        properties:
          results:
            items:
              properties:
                brand:
                  example: Garnier
                  type: string
                categories:
                  example:
                  - Perfumes
                  - OtroCategoria
                  items:
                    type: string
                  type: array
                count:
                  example: 12
                  type: integer
              type: object
            type: array
        title: Top results searches
        type: object
      example:
        results:
        - brand: Garnier
          categories: Perfumes
          count: 200
        total: 1
        total_count: 200
    StatsTimeResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Stats counter with timestamp.
        properties:
          results:
            items:
              properties:
                count:
                  example: 12
                  type: integer
                timestamp:
                  example: 1581120000000
                  type: integer
              type: object
            type: array
        title: Counters Stats by Time
        type: object
      example:
        results:
        - count: 12
          timestamp: 1581120000000
        total: 1
        total_count: 12
    CartJSONRegisterRequest:
      properties:
        checkout_json:
          $ref: '#/components/schemas/checkout_json'
        currency:
          $ref: '#/components/schemas/currency'
        hashid:
          $ref: '#/components/schemas/hashid'
        ip:
          $ref: '#/components/schemas/ip'
        referer:
          $ref: '#/components/schemas/referer'
        session_id:
          $ref: '#/components/schemas/session_id'
        user_agent:
          $ref: '#/components/schemas/user_agent'
        user_id:
          $ref: '#/components/schemas/user_id'
      required:
      - hashid
      - checkout_json
      type: object
    StatsError:
      description: Standard error wrapper for all Stats API error responses.
      properties:
        error:
          properties:
            code:
              description: Machine-readable error code.
              example: not_authenticated
              type: string
            message:
              description: Human-readable error description.
              example: Authentication required
              type: string
          required:
          - code
          - message
          type: object
      required:
      - error
      type: object
    StatsFacetsByDayResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Stats results for facets by day.
        properties:
          results:
            items:
              properties:
                additionalProperties:
                  description: Facets with stats by day
                  type: integer
                timestamp:
                  description: Date timestamp in the format of UNIX timestamp or YYYYMMDD.
                  type: integer
              type: object
            type: array
        title: Facets by day stats
        type: object
      example:
        results:
        - brand: 12
          timestamp: 1581120000000
        total: 1
        total_count: 12
    hashid:
      description: Unique id of the search engine. In the search engine selector,
        you will find the hashid information
      pattern: ^[a-f0-9]{32}$
      type: string
    user_id:
      description: Identifier of user
      maxLength: 36
      type: string
    StatsTopSearchesResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Stats results for top searches.
        properties:
          results:
            items:
              properties:
                count:
                  example: 12
                  type: integer
                query:
                  example: some term
                  type: string
              type: object
            type: array
        title: Top Searches Stats
        type: object
      example:
        results:
        - count: 12
          query: some term
        total: 1
        total_count: 12
    RegisterResult:
      description: Response returned over register stat operation.
      example:
        status: registered
      properties:
        status:
          description: Result of the stats request. i.e. 'registered'
          type: string
      title: Stats Response
      type: object
    TopSalesResult:
      description: Top Stats results for Sales.
      example:
        results:
        - avg_price: 500
          dfid: 070cdedbb32a134ad74db5ac9cd93b36@product@74446c03dd1ae404c61723db51a6766b
          sum_amount: 30
          title: coffee capsules
        - avg_price: 200.25
          dfid: 070cdedab32a134ad74db5ac9cd93b36@product@744d6c03dd1ae404c61723db51a6766b
          sum_amount: 20
          title: pencils
        total: 2
        total_count: 2
      properties:
        results:
          items:
            properties:
              avg_price:
                example: 3000
                type: number
              dfid:
                example: 070cdedbb32a134ad74db5ac9cd93b36@product@74446c03dd1ae404c61723db51a6766b
                type: string
              sum_amount:
                example: 21
                type: integer
              title:
                example: Item Title
                type: string
            type: object
          type: array
        total:
          description: Count of all top sales retrieved.
          example: 1
          type: integer
        total_count:
          description: Count of all top sales retrieved.
          example: 12
          type: integer
      title: Top Sales Results Stats
      type: object
    StatsRecommendationsResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Stats results for recommendations.
        properties:
          results:
            items:
              properties:
                clicks:
                  example: 2
                  type: integer
                displays:
                  example: 12
                  type: integer
                widget_id:
                  example: c2d64f5f-e99c-4ba8-a25a-3feed98ed68d
                  type: string
              type: object
            type: array
        title: Recommendations Stats
        type: object
      example:
        results:
        - clicks: 2
          displays: 12
          hashid: 300204d086f5ad7c4c81e625
          widget_id: c2d64f5f-e99c-4ba8-a25a-3feed98ed68d
        total: 1
        total_count: 1
    StatsBannersResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Stats results for banners.
        properties:
          results:
            items:
              properties:
                clicks:
                  example: 2
                  type: integer
                displays:
                  example: 12
                  type: integer
                id:
                  example: 3561
                  type: integer
              type: object
            type: array
        title: Banner Stats
        type: object
      example:
        results:
        - clicks: 2
          displays: 12
          id: 3561
        total: 1
        total_count: 1
    StatsFacetsResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Stats results for facets.
        properties:
          results:
            items:
              properties:
                count:
                  description: Number of times facet has been used in provided time
                    range
                  type: integer
                facet:
                  description: Used facet
                  type: string
                timestamp:
                  description: Date timestamp in the format of UNIX timestamp or YYYYMMDD.
                  type: integer
              type: object
            type: array
        title: Facets Stats
        type: object
      example:
        results:
        - count: 12
          facet: brand
          timestamp: 1581120000000
        total: 1
        total_count: 12
    StatsRedirectsResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Stats results for redirections.
        properties:
          results:
            items:
              properties:
                count:
                  example: 12
                  type: integer
                id:
                  example: 9771
                  type: integer
                link:
                  example: https://example.com/redirection
                  type: string
              type: object
            type: array
        title: Redirects Stats
        type: object
      example:
        results:
        - count: 12
          id: 9771
          link: https://example.com/redirection
        total: 1
        total_count: 12
    checkout_html:
      description: Base 64-encoded html for the checkout page. It should only contain
        the cart's products.
      type: string
    StatsCustomresultsResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Stats results for Custom results.
        properties:
          results:
            items:
              properties:
                clicks:
                  example: 2
                  type: integer
                displays:
                  example: 12
                  type: integer
                id:
                  example: 3561
                  type: integer
              type: object
            type: array
        title: Custom Results Stats
        type: object
      example:
        results:
        - clicks: 2
          displays: 10
          id: 3561
        - clicks: 0
          displays: 5
          id: 3220
        total: 2
        total_count: 2
    SaleRequest:
      properties:
        has_init:
          $ref: '#/components/schemas/has_init'
        hashid:
          $ref: '#/components/schemas/hashid'
        ip:
          $ref: '#/components/schemas/ip'
        referer:
          $ref: '#/components/schemas/referer'
        session_id:
          $ref: '#/components/schemas/session_id'
        user_agent:
          $ref: '#/components/schemas/user_agent'
        user_id:
          $ref: '#/components/schemas/user_id'
      required:
      - hashid
      type: object
    StatsRecommendationConversionsResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Stats results for recommendation conversions.
        properties:
          results:
            items:
              properties:
                conversions:
                  example: 3
                  type: integer
                widget_id:
                  example: c2d64f5f-e99c-4ba8-a25a-3feed98ed68d
                  type: string
              type: object
            type: array
        title: Recommendation Conversions Stats
        type: object
      example: null
    StatsTopFacetsResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Top Stats results for facets.
        properties:
          results:
            items:
              properties:
                count:
                  description: Number of times facet has been used in provided time
                    range
                  type: integer
                facet:
                  description: Used facet
                  type: string
                searches:
                  description: List of searches and it's count when facet is applied.
                  items:
                    properties:
                      count:
                        description: Number of times a search is associated to facet.
                        type: integer
                      query:
                        description: search
                        type: string
                    type: object
                  type: array
                value:
                  anyOf:
                  - description: Facet value used for filtering
                    type: string
                  - description: Range used for filtering
                    properties:
                      gte:
                        description: Start value of range
                        type: string
                      lte:
                        description: End value of range
                        type: string
                    type: object
              type: object
            type: array
        title: Top Facets Stats
        type: object
      example:
        results:
        - count: 10
          facet: categories
          searches:
          - count: 2
            query: example
          - count: 1
            query: example2
          value: Electronics
        - count: 7
          facet: price
          searches:
          - count: 2
            query: example
          - count: 1
            query: ''
          value:
            gte: '100'
            lt: '200'
        total: 2
        total_count: 17
    user_agent:
      deprecated: true
      description: Identifier of device. Detected automatically by the server.
      type: string
    currency:
      description: Currency of the checkout.
      example: EUR
      type: string
    url:
      description: Page URI visited by the user
      type: string
    SearchEngineUsageResult:
      description: Stats for user behaviour for a search engine.
      example:
        results:
        - inits: 2000
          searches: 8000
          visits: 3000
        total: 0
        total_count: 0
      properties:
        results:
          items:
            properties:
              inits:
                description: How many times the layer has been loaded (unique clicks
                  on search bar)
                example: 2000
                type: integer
              searches:
                description: Total of searches done
                example: 8000
                type: integer
              visits:
                description: How many visits a store has received
                example: 3000
                type: number
            type: object
          type: array
        total:
          description: Always 0.
          example: 0
          type: integer
        total_count:
          description: Always 0.
          example: 0
          type: integer
      title: Search engine user stats
      type: object
    StatsInitsUsersResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Inits users result.
        example:
          results:
          - sessions: 12170
            unique_sessions: 159080
            users: 5876
          total: 1
          total_count: 1
        properties:
          results:
            items:
              properties:
                sessions:
                  example: 12170
                  type: integer
                unique_sessions:
                  example: 159080
                  type: integer
                users:
                  example: 5876
                  type: integer
              type: object
            type: array
        title: Inits Users
        type: object
    referer:
      deprecated: true
      description: The referer header value, provides information about the URL from
        which the current request originated. Detected automatically by the server.
      type: string
    store:
      description: Identifier of store. In the store setup section, you will find
        the store ID information.
      maxLength: 36
      minLength: 1
      type: string
    StatsClickedItemsResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Stats results for clicked items.
        properties:
          results:
            items:
              properties:
                count:
                  example: 12
                  type: integer
                dfid:
                  example: abff7f4819f8e532ef11ce6638963b4e@product@567b8f5f423af15818a068235807edc0
                  type: string
                link:
                  example: https://example.com/item1
                  type: string
                title:
                  example: Item Name
                  type: string
              type: object
            type: array
        title: Clicks Stats
        type: object
      example:
        results:
        - count: 12
          dfid: abff7f4819f8e532ef11ce6638963b4e@product@567b8f5f423af15818a068235807edc0
          link: https://example.com/item1
          source:
            link: https://example.com/item1
            title: Item Name
          title: Item Name
        total: 1
        total_count: 12
    StatsClicksItemsPositionResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Clicks items position result.
        properties:
          results:
            items:
              properties:
                clicks:
                  description: How many clicks that product had in that position
                  example: 12170
                  type: integer
                position:
                  description: The product's position when clicked
                  example: 10
                  type: integer
                product:
                  description: The Id of the product
                  example: 5876
                  type: string
              type: object
            type: array
        title: Clicks Items Position
        type: object
      example:
        results:
        - clicks: 12170
          product_clicks: 159080
          sum_product_position: 5876
        total: 1
        total_count: 1
    checkout_json:
      description: Checkout json array with the cart items basic data.
      example:
      - id: prod_12345
        price: 29.99
        quantity: 2
      - id: prod_67890
        price: $12.50
        quantity: 1
      items:
        properties:
          id:
            description: The id field for the indexed item.
            example: prod_12345
            type: string
          price:
            description: The price of the product. If passed as a string, it is expected
              to have a currency. If passed as a number, it will use the search engine's
              currency.
            example: 29.99
            oneOf:
            - type: string
            - type: number
          quantity:
            description: How many items of this product are being bought.
            example: 2
            type: integer
          title:
            deprecated: true
            type: string
        required:
        - id
        - quantity
        - price
        type: object
      type: array
    StatsResult:
      properties:
        total:
          description: Sum of all elements retrieved.
          example: 1
          type: integer
        total_count:
          description: Total sum of all elements count. If element does not have a
            "count", this has the same value as `total`.
          example: 12
          type: integer
      title: Stats Result
      type: object
    StatsSalesResult:
      description: Stats results for Sales.
      example:
        results:
        - amount: 2.2
          session: 24cb1eccd1cf4a67d071f2deeac75e33
        - amount: 1.0
          session: a4eaf92a223c024b7c6680dc807c3f84
        total: 2
        total_amount: 3.2
      properties:
        results:
          items:
            properties:
              amount:
                example: 2.0
                format: float
                type: number
              session:
                example: ed8fb684573cdbb3d511e465c04e2d21
                type: string
            type: object
          type: array
        total:
          description: Count of all sales retrieved.
          example: 1
          type: integer
        total_amount:
          description: Total sum of all sales amount.
          example: 12
          type: integer
      title: Sales Results Stats
      type: object
    ip:
      deprecated: true
      description: Unique address that identifies a device. Detected automatically
        by the server.
      type: string
    StatsLocationResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Sessions geolocations result.
        properties:
          results:
            items:
              properties:
                latitude:
                  example: 38.0952
                  format: float
                  type: number
                longitude:
                  example: -3.636
                  format: float
                  type: number
              type: object
            type: array
        title: Sessions Geoocation
        type: object
      example:
        results:
        - latitude: 38.0952
          longitude: -3.636
        total: 1
        total_count: 1
    VisitRegisterRequest:
      properties:
        dfid:
          type: string
        hashid:
          $ref: '#/components/schemas/hashid'
        ip:
          $ref: '#/components/schemas/ip'
        page_type:
          type: string
        session_id:
          $ref: '#/components/schemas/session_id'
        store:
