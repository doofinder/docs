      - store
      type: object
    StatsSearchesLocationResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Searches locations result.
        properties:
          results:
            items:
              properties:
                city:
                  example: Madrid
                  type: string
                continent:
                  example: Europe
                  type: string
                country:
                  example: Spain
                  type: string
                latitude:
                  example: 38.0952
                  format: float
                  type: number
                longitude:
                  example: -3.636
                  format: float
                  type: number
                query:
                  example: perfume y hombre
                  type: string
              type: object
            type: array
        title: Searches Locations
        type: object
      example:
        results:
        - city: Madrid
          continent: Europe
          country: Spain
          latitude: 38.0952
          longitude: -3.636
          query: perfume y hombre
        total: 1
        total_count: 1
    session_id:
      description: Identifier of search session
      maxLength: 32
      nullable: true
      type: string
    StatsClicksUsersResult:
      allOf:
      - $ref: '#/components/schemas/StatsResult'
      - description: Clicks users result.
        properties:
          results:
            items:
              properties:
                clicks:
                  example: 12170
                  type: integer
                product_clicks:
                  example: 159080
                  type: integer
                users:
                  example: 5876
                  type: integer
              type: object
            type: array
        title: Clicks Users
        type: object
      example:
        results:
        - clicks: 12170
          product_clicks: 159080
          users: 5876
        total: 1
        total_count: 1
  securitySchemes:
    api_token:
      description: 'Doofinder API key. Pass it as:

        Authorization: Token <api_key>

        '
      in: header
      name: Authorization
      type: apiKey
    jwt_token:
      description: 'JWT Bearer token. Sign a JWT with your API key (HS256) and pass
        it as:

        Authorization: Bearer <jwt_token>

        '
      in: header
      name: Authorization
      type: apiKey
info:
  contact:
    name: Doofinder Support
    url: https://docs.doofinder.com/
  description: "# Introduction\n\nDoofinder Stats API provides statistical information\
    \ about your search engines.\n\n# Basics\n\n## Endpoint\n\nAll requests should\
    \ be done via `https` to the right endpoint:\n\n```\nhttps://{search-zone}-api.doofinder.com\n\
    ```\n\nWhere `{search-zone}` is the code of the datacenter where your search engines\
    \ are located.\n\nFor instance:\n\n```\nhttps://eu1-api.doofinder.com\nhttps://us1-api.doofinder.com\n\
    ```\n\n## Authentication\n\nTo authenticate you need a Doofinder API key. If you\
    \ don't have one you can generate it in the Doofinder Admin by going to your Account\
    \ and then to API Keys, [here](https://admin.doofinder.com/admin/account/api).\n\
    \nA valid API key looks like this:\n\n```\nab46030xza33960aac71a10248489b6c26172f07\n\
    ```\n\n### API Token\n\nYou can authenticate with the previous API key. The correct\
    \ way to authenticate is to send a HTTP Header with the name `Authorization` and\
    \ the value `Token {api-key}`.\n\nI.e.:\n\n```\nAuthorization: Token ab46030xza33960aac71a10248489b6c26172f07\n\
    ```\n\n### JWT Token\n\nIf you prefer you can authenticate with a [JSON Web Token](https://jwt.io).\
    \ The token must be signed with an API management key and there are some claims\
    \ required in the JWT payload. These claims are:\n\n  * `iat` (issued at): Creation\
    \ datetime timestamp, i.e. the moment when the JWT was created.\n\n  * `exp` (expiration\
    \ time): Expiration datetime timestamp, i.e. the moment when the JWT is going\
    \ to expire and will no longer be valid. The time span between issued and expiration\
    \ dates must be shorter than a week.\n\n  * `name`: Your user code. It is your\
    \ unique identifier as doofinder user. You can find this code in your profile\
    \ page in the Doofinder's administration panel.\n\nTo authenticate using JWT you\
    \ must send a HTTP header with the name `Authorization` and the value `Bearer\
    \ {JWT-token}`.\n\nI.e.:\n\n```\nAuthorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1lIjoidGVzdCIsImlhdCI6MTUxNjIzOTAyMn0.QX_3HF-T2-vlvzGDbAzZyc1Cd-J9qROSes3bxlgB4uk\n\
    ```\n\n## Conventions\n\nAlong most of the code samples you will find placeholders\
    \ for some common variable values. They are:\n\n  * `{hashid}`: The search engine's\
    \ unique id. e.g.: d8fdeab7fce96a19d3fc7b0ca7a1e98b.\n\n  * `{index}`: When storing\
    \ items, they're always stored under a certain _index_. e.g.: product.\n\n  *\
    \ `{token}`: Your personal authentication token obtained in the control panel.\n\
    \n## Api limits\n\n### Requests rate\n\nThe API has a limit of 20 requests per\
    \ second. If you do more than that, the next requests will get a `429 Too Many\
    \ Requests` error. There is no penalty associated to that error, but you must\
    \ wait one second before attempting more requests.\n\n### Body size\n\nThe body\
    \ size for requests with data sending (eg: POST or PUT requests) has a limit of\
    \ 8MB. If you do a request with a request body bigger than 8 MB, the response\
    \ will be `413 Payload Too Large`. This is important mostly for batch calls like\
    \ batch create items.\n\n# Objects\n\n## Search Engines\n\nA search engine is\
    \ a collection of indices where data is stored. It has some properties like name,\
    \ language, and some other configuration options that are shared among all of\
    \ its indices.\n\nEach search engine is uniquely identified by its `hashid` which\
    \ is an auto-generated string.\n\nSearch engines have a _\"process\"_ operation\
    \ which takes items from all its data sources and insert them into their indices.\
    \ This operation has a zero downtime, you can still search into indices while\
    \ processing.\n"
  termsOfService: https://www.doofinder.com/en/terms-and-conditions
  title: Doofinder Stats API
  version: '2.0'
