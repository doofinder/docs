  '/api/v2/search_engines/{hashid}/_process':
    get:
      tags:
        - Search Engines
      summary: Get process task status
      description:
        Gets the status of the last process task. Status persists for 72 hours.
        If there is no recent task, it will return an error.
      operationId: process_status
      parameters:
        - $ref: '#/components/parameters/searchengine_hashid'
      responses:
        200:
          description: Task details retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingTask'
    post:
      tags:
        - Search Engines
      summary: Process
      description:
        Schedules a task for processing all search engine's data sources.
      operationId: process
      parameters:
        - $ref: '#/components/parameters/searchengine_hashid'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                callback_url:
                  description:
                    When the tasks finishes, the systems calls to the provided URL
                    giving the final status of the task. URL must use HTTPS.
                    The call will be a POST, with the data result on the body.
                  type: string
                  format: url
                  example: https://example_url.com
      responses:
        '201':
          description: Tasks succesfully scheduled.
          content:
            application/json:
              schema:
                title: Process Task
                description: Task succesfylly scheduled.
                type: object
                properties:
                  href:
                    description: Url to call to, gets the state of the indexation process (GET).
                    type: string
                  message:
                    description: Result of the task created.
                    type: string
                example:
                  href: /api/v2/search_engines/{hashid}/_process
                  message: PROCESS_CREATED
